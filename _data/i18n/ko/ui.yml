# --- 홈페이지 ----------------------------------------------------------------
home_intro: |-
  오픈 소스 라이선스는 기여자와 사용자를 보호합니다. 기업과 노련한 개발자는 이러한 보호가 없는 프로젝트에는 손대지 않습니다.
home_situations_question: "다음 중 당신의 상황을 가장 잘 설명하는 것은 무엇인가요?"
home_community_title: "저는 커뮤니티 안에서 작업해야 합니다."
home_community_content: |-
  당신이 기여하거나 의존하는 [커뮤니티가 선호하는 라이선스](community/)를 사용하세요. 당신의 프로젝트가 자연스럽게 어울릴 것입니다.

  라이선스가 없는 의존성이 있다면, 그 메인테이너에게 [라이선스를 추가](no-permission/#for-users)해 달라고 요청하세요.
home_permissive_title: "간단하고 관대한 라이선스를 원합니다."
home_permissive_content: |-
  [MIT 라이선스](licenses/mit/)는 짧고 명료합니다. 비공개 소스 버전을 만들고 배포하는 것을 포함해, 사람들이 당신의 프로젝트로 거의 무엇이든 할 수 있게 해 줍니다.
home_copyleft_title: "개선 사항을 공유하는 것이 중요합니다."
home_copyleft_content: |-
  [GNU GPLv3](licenses/gpl-3.0/) 역시 사람들이 당신의 프로젝트로 거의 무엇이든 할 수 있게 해 주지만, 비공개 소스 버전을 배포하는 것은 *예외*입니다.
home_more_question: "이 중 어느 것도 제게 맞지 않으면 어떻게 하나요?"
home_nonsoftware_title: "제 프로젝트는 소프트웨어가 아닙니다."
home_nonsoftware_content: |-
  [그런 경우를 위한 라이선스가 있습니다](non-software/).
home_morechoices_title: "더 많은 선택지를 원합니다."
home_morechoices_content: |-
  [더 많은 라이선스가 있습니다](licenses/).
home_nolicense_title: "라이선스를 선택하고 싶지 않습니다."
home_nolicense_content: |-
  [선택하지 않으면 어떻게 되는지 알려드립니다](no-permission/).

# --- 라이선스 페이지(/licenses/) ---------------------------------------------
licenses_intro_html: |-
  오픈 소스 라이선스는 소프트웨어의 출처와 개방성을 보존하는 조건을 전제로, 누구나 라이선스가 부여된 소프트웨어를 어떤 목적으로든 사용, 수정, 공유할 수 있도록 허용합니다. 아래 라이선스는 조건의 수에 따라 가장 많은 것(GNU AGPLv3)부터 전혀 없는 것(Unlicense)까지 정렬되어 있습니다. <a href="/">홈페이지</a>에서 소개하는 인기 라이선스(GNU GPLv3와 MIT)도 이 범위 안에 들어 있다는 점에 유의하세요.
licenses_appendix_note_html: |-
  choosealicense.com의 모든 라이선스 참조 표를 찾고 있다면 <a href="/appendix">부록</a>을 참고하세요.
licenses_outro_html: |-
  위 라이선스들은 매우 보호적인 것부터 무조건적인 것까지 오픈 소스 라이선스의 전체 범위를 나타냅니다. 이 중 하나면 대부분의 새 오픈 소스 프로젝트에 적합할 것입니다. 위 라이선스의 이전 버전이나 가까운 대체 라이선스를 포함해, 다른 많은 오픈 소스 라이선스가 존재합니다. 더 자세히 알고 싶다면 <a href="/about/">소개 페이지</a>에 나열된 자료를 참고하세요.

# --- 소개 페이지(/about/) ----------------------------------------------------
about_intro: |-
  GitHub은 개발자가 소스 코드에 적합한 오픈 소스 라이선스를 선택하도록 돕고자 합니다.

  이미 잘 알고 있고 선호하는 라이선스가 있다면 더할 나위 없이 좋습니다! 우리는 당신의 생각을 바꾸려는 것이 아닙니다. 하지만 너무 많은 선택지에 어리둥절하다면, 우리가 도움이 될 수 있을지도 모릅니다.
about_not_comprehensive_heading: "전부를 다루지는 않습니다"
about_not_comprehensive_p1: |-
  이 사이트는 오픈 소스 라이선스의 종합 목록이 아닙니다. 대다수 프로젝트는 [홈페이지](/)에서 강조한 세 가지 선택지 중 하나로 충분할 것입니다 — 당신과 비슷한 프로젝트가 [선호하는](/community/) 라이선스, 가장 인기 있는 관대형 라이선스([MIT](/licenses/mit/)), 또는 가장 인기 있는 카피레프트 라이선스([GNU GPLv3](/licenses/gpl-3.0/)). 이들로 다루지 못하는 특수한 요구가 있을 경우를 대비해, [고려할 만한 다른 라이선스 몇 가지](/licenses/)도 소개하고 [비소프트웨어 프로젝트를 위한 라이선스](/non-software/)에 관한 페이지도 마련해 두었습니다.
about_not_comprehensive_p2: |-
  [choosealicense.com 저장소](https://github.com/github/choosealicense.com)에 정리된 모든 라이선스의 표는 [부록](/appendix/)을 참고하세요. 그리고 아래 링크에서, 훌륭한 라이선스를 선택하기 위해 굳이 **알 필요가 없는** *훨씬 더 많은* 라이선스를 확인할 수 있습니다.
about_resources_heading: "추가 자료"
about_resources_list: |-
  * Open Source Initiative의 FAQ: [내 소프트웨어를 공개할 때 어떤 오픈 소스 라이선스를 선택해야 할까?](https://opensource.org/faq#which-license)
  * Free Software Foundation의 [라이선스 선택 방법에 관한 조언](https://www.gnu.org/licenses/license-recommendations.html)
  * [Joinup Licensing Assistant](https://joinup.ec.europa.eu/collection/eupl/joinup-licensing-assistant-jla), 유럽 위원회가 제공하는 대화형 라이선스 선택 도구
  * [The Legal Side of Open Source](https://opensource.guide/legal/), 라이선스 및 관련 문제를 다루는 Open Source Guide
about_improve_heading: "개선을 도와주세요"
about_improve_p: |-
  Choosealicense.com은 오픈 소스에 관한 것일 뿐 아니라, 사이트 자체도 오픈 소스입니다. 더 잘할 수 있다고 생각되는 부분이 있나요? 부담 없이 GitHub에서 [프로젝트를 포크](https://github.com/github/choosealicense.com)하고 풀 리퀘스트를 보내 주세요. 여러분의 개선을 환영합니다.
about_disclaimer_heading: "면책 조항"
about_disclaimer_p: |-
  우리는 변호사가 아닙니다. 적어도 대부분은요. 이 사이트의 목적은 법률 자문을 제공하는 것이 아닙니다. 이 사이트의 목적은 인기 있는 오픈 소스 라이선스에 관한 정보를 간단하게 제공해, 정보에 입각한 선택을 하도록 돕는 출발점을 제공하는 것입니다. 당신의 코드에 가장 적합한 라이선스나 그와 관련된 다른 법률 문제에 대해 궁금한 점이 있다면, 추가로 조사하거나 전문가와 상담하는 것은 당신의 책임입니다.

# --- 기존 프로젝트 및 커뮤니티(/community/) ----------------------------------
comm_p1: |-
  기존 프로젝트에 기여하거나 이를 확장한다면, 거의 항상 그 프로젝트의 라이선스를 계속 사용하는 것이 가장 쉽습니다. 라이선스를 찾으려면 `LICENSE`나 `COPYING`이라는 파일을 찾고, 프로젝트의 `README`를 훑어보세요. 라이선스를 찾을 수 없다면 [메인테이너에게 문의하세요](/no-permission/#for-users).
comm_p2: |-
  원본 프로젝트의 라이선스에 따라, 같은 라이선스를 사용하는 것이 단지 가장 쉬운 방법이 아니라 요구 사항일 수도 있습니다. ([일부 라이선스](/licenses/)의 "동일 라이선스" 조건을 참고하세요.)
comm_p3: |-
  일부 커뮤니티는 특정 라이선스에 대한 강한 선호가 있습니다. 그중 한 곳에 참여하고 싶다면, 기존 의존성이 전혀 없는 완전히 새로운 프로젝트를 시작하더라도 해당 커뮤니티가 선호하는 라이선스를 쓰는 편이 더 수월합니다. 몇 가지 예는 다음과 같습니다:
comm_list: |-
  * [Apache](https://www.apache.org/licenses/)는 [Apache License 2.0](/licenses/apache-2.0/)을 요구합니다
  * [Cloud Native Computing Foundation](https://github.com/cncf/foundation/blob/main/charter.md#11-ip-policy)은 [Apache License 2.0](/licenses/apache-2.0/)을 요구합니다
  * [GNU](https://www.gnu.org/licenses/license-recommendations.html)는 대부분의 프로그램에 [GNU GPLv3](/licenses/gpl-3.0/)을 권장합니다
  * [npm 패키지](https://libraries.io/search?platforms=npm)는 압도적으로 [MIT](/licenses/mit/) 또는 매우 유사한 [ISC](/licenses/isc) 라이선스를 사용합니다
  * [OpenBSD](https://www.openbsd.org/policy.html)는 [ISC License](/licenses/isc/)를 선호합니다
  * [Rust](https://rust-lang.github.io/api-guidelines/necessities.html#crate-and-its-dependencies-have-a-permissive-license-c-permissive) 크레이트는 압도적으로 [MIT](/licenses/mit/) [`OR`](https://spdx.github.io/spdx-spec/v2.3/SPDX-license-expressions/#d42-disjunctive-or-operator) [Apache License 2.0](/licenses/apache-2.0/)으로 라이선스됩니다
  * [WordPress](https://wordpress.org/about/license/) 플러그인과 테마는 [GNU GPLv2](/licenses/gpl-2.0/)(또는 이후 버전)여야 합니다
  * [Joomla](https://tm.joomla.org/joomla-license-faq.html#can-i-release-an-extension-under-a-non-gpl-license) 확장과 템플릿의 PHP 코드는 [GNU GPLv2](/licenses/gpl-2.0/)여야 합니다.
comm_p4: |-
  커뮤니티는 형태와 규모가 제각각이며, 둘 이상의 커뮤니티가 관련될 수도 있습니다(예: 회사에 다니고 있다면 [당신의 회사](https://opensource.guide/legal/#what-does-my-companys-legal-team-need-to-know)도 염두에 두세요). 위의 예시들은 *매우* 잘 확립되어 있습니다. 프로젝트를 만들고 있는 커뮤니티에 확고한 라이선스 관행이 없거나, 당신의 프로젝트가 특정 커뮤니티의 일부라고 생각되지 않는다면, 그래도 괜찮습니다: [당신만의 오픈 소스 라이선스를 선택하세요](/).

# --- 라이선스 없음(/no-permission/) ------------------------------------------
np_p1: |-
  창작물(코드를 포함합니다)을 만들면, 그 저작물은 기본적으로 배타적 저작권의 보호를 받습니다. 달리 정한 라이선스를 포함하지 않는 한, 다른 누구도 게시물 삭제, 합의금 요구, 소송의 위험 없이는 당신의 저작물을 복사, 배포, 수정할 수 없습니다. 저작물에 다른 기여자(각자 저작권자)가 생기는 순간, "누구도"라는 표현에는 당신 자신도 포함되기 시작합니다.
np_p2: |-
  라이선스 파일이 없더라도, 서비스 약관 동의가 필요한 사이트에 소스 코드를 게시하는 경우에는 일부 권리를 부여할 수 있습니다. 예를 들어 GitHub의 공개 저장소에 소스 코드를 게시하면, 당신은 다른 사람이 저장소를 보고 포크하도록 허용하는 [서비스 약관](https://help.github.com/articles/github-terms-of-service)에 동의한 것입니다. 다른 사람의 특정 상황에 [저작권의 제한과 예외](https://en.wikipedia.org/wiki/Limitations_and_exceptions_to_copyright)가 적용된다면 그들에게는 당신의 허락이 필요 없을 수도 있습니다. 사이트 약관도, 관할권별 저작권 제한도, 오픈 소스 라이선스가 촉진하는 실험·수정·공유처럼 사람들이 보통 공개 코드 호스트에서 추구하는 종류의 협업에는 충분하지 않습니다.
np_p3: |-
  라이선스를 제공하지 *않기* 위해 따로 해야 할 일은 없습니다. 다만 [사용자](#for-users)가 실수로 빠뜨린 것으로 오해하지 않도록, 잘 보이는 곳(예: 프로젝트의 README)에 저작권 표시와 더불어 어떠한 라이선스도 제공하지 않는다는 문구를 추가하고 싶을 수 있습니다. 라이선스 없는 프로젝트에 다른 사람의 기여를 받을 생각이라면, 같은 권리를 부여하지 않더라도 기여자로부터 저작권상의 허락을 계속 유지할 수 있도록, 변호사와 함께 프로젝트에 기여자 동의서를 추가하는 방안을 검토하고 싶을 수 있습니다.
np_p4: |-
  코드 사용을 금지하는 것이 당신이 "라이선스 없음"으로 의도한 바가 아닐 수도 있습니다. [오픈 소스 라이선스](/)는 저작권을 유지하면서도 코드의 재사용을 허용합니다. 저작권 제한에서 완전히 벗어나는 것이 목표라면, 대신 [퍼블릭 도메인 헌정](/licenses/#unlicense)을 시도해 보세요.
np_forusers_heading: "사용자를 위한 안내"
np_forusers_p: |-
  라이선스가 없는 소프트웨어를 발견했다면, 이는 일반적으로 그 소프트웨어의 제작자로부터 사용, 수정, 공유에 대한 허락을 전혀 받지 못했다는 뜻입니다. GitHub 같은 코드 호스트에서 코드를 보고 포크할 수 있더라도, 이것이 어떤 목적으로든 소프트웨어를 사용, 수정, 공유하도록 허용된다는 의미는 아닙니다.
np_options_intro: "선택지:"
np_options_list: |-
  - **메인테이너에게 정중하게 라이선스를 추가해 달라고 요청하세요.** 소프트웨어에 그 반대를 강하게 시사하는 표시가 없다면, 라이선스가 없는 것은 아마 실수일 것입니다. 소프트웨어가 GitHub 같은 사이트에 호스팅되어 있다면, 라이선스를 요청하는 이슈를 열고 이 사이트의 링크를 포함하세요. 대담하고 어떤 라이선스가 가장 적합한지 꽤 분명하다면, 라이선스를 추가하는 풀 리퀘스트를 열어 보세요 — 이 사이트의 각 라이선스 페이지 사이드바에 있는 "이 라이선스 제안하기"를 참고하세요(예: [MIT](/licenses/mit/#suggest-this-license)).
  - **그 소프트웨어를 사용하지 마세요.** 오픈 소스 라이선스로 배포되는 대안을 찾거나 직접 만드세요.
  - **사적인 라이선스를 협상하세요.** 변호사와 함께하세요.

# --- 비소프트웨어 라이선스(/non-software/) -----------------------------------
ns_intro: |-
  오픈 소스 소프트웨어 라이선스는 비소프트웨어 저작물에도 사용할 수 있으며, 특히 해당 저작물을 소스처럼 편집하고 버전 관리할 수 있을 때는 종종 최선의 선택입니다. [오픈 소스 라이선스를 선택하세요](/).
ns_data_heading: "데이터, 미디어 등"
ns_data_p: |-
  [CC0-1.0](/licenses/cc0-1.0/), [CC-BY-4.0](/licenses/cc-by-4.0/), [CC-BY-SA-4.0](/licenses/cc-by-sa-4.0/)은 데이터셋부터 동영상까지 다양한 비소프트웨어 자료에 사용되는 [개방형](https://opendefinition.org) 라이선스입니다. 크리에이티브 커먼즈는 자사 라이선스를 [소프트웨어](https://creativecommons.org/faq/#can-i-apply-a-creative-commons-license-to-software)나 하드웨어에 사용하는 것을 권장하지 않는다는 점에 유의하세요.
ns_doc_heading: "문서"
ns_doc_p: |-
  모든 오픈 소스 소프트웨어 라이선스나 미디어용 개방형 라이선스(위의 [내용](#data-media-etc) 참고)는 소프트웨어 문서에도 적용됩니다. 소프트웨어와 그 문서에 서로 다른 라이선스를 사용한다면, 문서에 포함된 소스 코드 예제도 소프트웨어 라이선스에 따라 라이선스됨을 반드시 명시하세요.
ns_fonts_heading: "글꼴"
ns_fonts_p: |-
  [SIL Open Font License 1.1](/licenses/ofl-1.1/)은 글꼴을 개방된 상태로 유지하여 다른 저작물에 자유롭게 사용할 수 있게 합니다.
ns_hardware_heading: "하드웨어"
ns_hardware_p: |-
  가구부터 [FPGA](https://oshwa.org/resources/best-practices-for-sharing-fpga-designs/)에 이르는 [오픈 소스 하드웨어](https://oshwa.org/resources/open-source-hardware-definition/) 설계는 CERN Open Hardware 라이선스로 다룹니다: [CERN-OHL-P-2.0](/licenses/cern-ohl-p-2.0/)(관대형), [CERN-OHL-W-2.0](/licenses/cern-ohl-w-2.0/)(약한 상호주의), [CERN-OHL-S-2.0](/licenses/cern-ohl-s-2.0/)(강한 상호주의).
ns_mixed_heading: "혼합 프로젝트"
ns_mixed_p: |-
  프로젝트에 여러 종류의 자료가 섞여 있다면, 프로젝트의 각 부분에 어떤 라이선스가 적용되는지 명확히 밝히는 한 여러 라이선스를 포함할 수 있습니다. 예시로 [이 사이트의 라이선스 표기](https://github.com/github/choosealicense.com#license)를 참고하세요.

# --- 부록(/appendix/) --------------------------------------------------------
appendix_intro_p1: |-
  참고를 위해, [choosealicense.com 저장소](https://github.com/github/choosealicense.com)에 설명된 모든 라이선스의 표를 아래에 정리했습니다.
appendix_intro_p2: |-
  라이선스를 선택하려고 오셨다면, **[홈페이지에서 시작하세요](/)**. 대부분의 경우에 적합한 몇 가지 라이선스를 볼 수 있습니다.
appendix_col_license: "라이선스"
appendix_legend_heading: "범례"
appendix_legend_permissions_html: |-
  오픈 소스 라이선스는, 저작권법이나 그 밖의 "지식 재산권" 법이 금지할 수도 있는 일을 라이선스가 부여된 저작물로 할 수 있도록 대중에게 <span class="license-permissions"><span class="license-marker">✓</span></span> <b>허용</b>을 부여합니다.
appendix_legend_conditions_html: |-
  대부분의 오픈 소스 라이선스가 부여하는 허용은 <span class="license-conditions"><span class="license-marker">ⓘ</span></span> <b>조건</b>의 준수를 전제로 합니다.
appendix_legend_limitations_html: |-
  대부분의 오픈 소스 라이선스에는 보통 보증과 책임을 부인하고, 때로는 라이선스의 부여 대상에서 특허나 상표를 명시적으로 제외하는 <span class="license-limitations"><span class="license-marker">✕</span></span> <b>제한</b>도 있습니다.

