# --- Page d'accueil ----------------------------------------------------------
home_intro: |-
  Une licence open source protège les contributeurs et les utilisateurs. Les entreprises et les développeurs avertis ne toucheront pas à un projet dépourvu de cette protection.
home_situation_q: "Laquelle de ces situations décrit le mieux la vôtre ?"
home_community_h3: "Je dois travailler au sein d'une communauté."
home_community_p1: |-
  Utilisez la [licence privilégiée par la communauté](community/) à laquelle vous contribuez ou dont vous dépendez. Votre projet s'y intégrera naturellement.
home_community_p2: |-
  Si l'une de vos dépendances n'a pas de licence, demandez à ses mainteneurs d'en [ajouter une](no-permission/#for-users).
home_permissive_h3: "Je veux quelque chose de simple et permissif."
home_permissive_p1: |-
  La [licence MIT](licenses/mit/) est courte et va à l'essentiel. Elle permet à quiconque de faire presque tout ce qu'il veut avec votre projet, y compris en créer et en distribuer des versions à code source fermé.
home_copyleft_h3: "Je tiens au partage des améliorations."
home_copyleft_p1: |-
  La [GNU GPLv3](licenses/gpl-3.0/) permet elle aussi de faire presque tout ce que l'on veut avec votre projet, *sauf* en distribuer des versions à code source fermé.
home_more_q: "Et si aucune ne me convient ?"
home_nonsoftware_h3: "Mon projet n'est pas un logiciel."
home_nonsoftware_p: |-
  [Il existe des licences pour cela](non-software/).
home_morechoices_h3: "Je veux plus de choix."
home_morechoices_p: |-
  [D'autres licences sont disponibles](licenses/).
home_nolicense_h3: "Je ne veux pas choisir de licence."
home_nolicense_p: |-
  [Voici ce qui se passe si vous ne le faites pas](no-permission/).

# --- Page des licences (/licenses/) -----------------------------------------
licenses_intro_html: |-
  Les licences open source accordent à toute personne la permission d’utiliser, de modifier et de partager un logiciel sous licence, à toutes fins, sous réserve de conditions préservant la provenance et l’ouverture du logiciel. Les licences ci-dessous sont classées par nombre de conditions, de la plus exigeante (GNU AGPLv3) à aucune (Unlicense). Remarquez que les licences populaires mises en avant sur la <a href="/">page d’accueil</a> (GNU GPLv3 et MIT) s’inscrivent dans ce spectre.
licenses_appendix_note_html: |-
  Si vous cherchez un tableau de référence de toutes les licences de choosealicense.com, consultez l’<a href="/appendix">annexe</a>.
licenses_outro_html: |-
  Les licences ci-dessus représentent l’ensemble du spectre des licences open source, des plus protectrices aux plus inconditionnelles. L’une d’elles devrait convenir à la plupart des nouveaux projets open source. Il existe de nombreuses autres licences open source, y compris d’anciennes versions et de proches équivalents de certaines des précédentes. Consultez les ressources listées sur notre <a href="/about/">page « à propos »</a> si vous souhaitez en savoir plus.

# --- Page « à propos » (/about/) --------------------------------------------
about_intro: |-
  GitHub souhaite aider les développeurs à choisir une licence open source pour leur code source.

  Si vous savez déjà ce que vous faites et avez une licence que vous préférez utiliser, c'est parfait ! Nous ne sommes pas là pour vous faire changer d'avis. Mais si le grand nombre de choix vous déconcerte, nous pouvons peut-être vous aider.
about_not_comprehensive_heading: "Liste non exhaustive"
about_not_comprehensive_p1: |-
  Ce site n'est pas un répertoire exhaustif des licences open source. La grande majorité des projets seront probablement bien servis par l'une des trois options mises en avant sur la [page d'accueil](/) — choisir la licence [privilégiée](/community/) par des projets similaires au vôtre, ou la licence permissive la plus populaire ([MIT](/licenses/mit/)), ou la licence copyleft la plus populaire ([GNU GPLv3](/licenses/gpl-3.0/)). Au cas où vous auriez des besoins spécifiques non couverts par celles-ci, nous mettons aussi en avant [quelques autres licences à envisager](/licenses/) et proposons une page sur les [licences pour les projets non logiciels](/non-software/).
about_not_comprehensive_p2: |-
  Consultez notre [annexe](/appendix/) pour un tableau de toutes les licences cataloguées dans le [dépôt choosealicense.com](https://github.com/github/choosealicense.com), ainsi que les liens ci-dessous pour *encore plus* de licences que vous **n'avez pas besoin** de connaître pour autant choisir une excellente licence pour votre projet.
about_resources_heading: "Ressources supplémentaires"
about_resources_list: |-
  * La FAQ de l'Open Source Initiative : [Sous quelle licence open source publier mon logiciel ?](https://opensource.org/faq#which-license)
  * Les [conseils de la Free Software Foundation pour choisir une licence](https://www.gnu.org/licenses/license-recommendations.html)
  * [Joinup Licensing Assistant](https://joinup.ec.europa.eu/collection/eupl/joinup-licensing-assistant-jla), un sélecteur de licence interactif de la Commission européenne
  * [The Legal Side of Open Source](https://opensource.guide/legal/), un guide Open Source couvrant les licences et les questions connexes
about_improve_heading: "Aidez-nous à l'améliorer"
about_improve_p: |-
  Choosealicense.com ne parle pas seulement d'open source : le site lui-même est open source. Vous voyez quelque chose qui pourrait être mieux fait ? N'hésitez pas à [forker le projet](https://github.com/github/choosealicense.com) sur GitHub et à proposer une pull request. Vos améliorations sont les bienvenues.
about_disclaimer_heading: "Avertissement"
about_disclaimer_p: |-
  Nous ne sommes pas juristes. Enfin, la plupart d'entre nous. L'objectif de ce site n'est pas de fournir des conseils juridiques. Son but est d'offrir un point de départ pour vous aider à faire un choix éclairé, en présentant de façon simplifiée des informations sur les licences open source populaires. Si vous avez des questions sur la meilleure licence pour votre code, ou sur toute autre question juridique le concernant, il vous appartient de poursuivre vos recherches ou de consulter un professionnel.

# --- Projets et communautés existants (/community/) -------------------------
comm_p1: |-
  Si vous contribuez à un projet existant ou si vous l'étendez, il est presque toujours plus simple de continuer à utiliser la licence de ce projet. Pour la trouver, cherchez un fichier nommé `LICENSE` ou `COPYING`, et parcourez le `README` du projet. Si vous ne trouvez pas de licence, [demandez aux mainteneurs](/no-permission/#for-users).
comm_p2: |-
  Selon la licence du projet d'origine, utiliser la même licence peut être une obligation, et pas seulement la solution la plus simple. (Voir la condition « même licence » de [certaines licences](/licenses/).)
comm_p3: |-
  Certaines communautés ont de fortes préférences pour des licences particulières. Si vous voulez participer à l'une d'elles, il sera plus simple d'utiliser sa licence privilégiée, même si vous démarrez un tout nouveau projet sans dépendance existante. En voici quelques exemples :
comm_list: |-
  * [Apache](https://www.apache.org/licenses/) impose l'[Apache License 2.0](/licenses/apache-2.0/)
  * La [Cloud Native Computing Foundation](https://github.com/cncf/foundation/blob/main/charter.md#11-ip-policy) impose l'[Apache License 2.0](/licenses/apache-2.0/)
  * [GNU](https://www.gnu.org/licenses/license-recommendations.html) recommande la [GNU GPLv3](/licenses/gpl-3.0/) pour la plupart des programmes
  * Les [paquets npm](https://libraries.io/search?platforms=npm) utilisent massivement la licence [MIT](/licenses/mit/) ou la très similaire [ISC](/licenses/isc)
  * [OpenBSD](https://www.openbsd.org/policy.html) préfère la [licence ISC](/licenses/isc/)
  * Les crates [Rust](https://rust-lang.github.io/api-guidelines/necessities.html#crate-and-its-dependencies-have-a-permissive-license-c-permissive) sont massivement publiées sous [MIT](/licenses/mit/) [`OR`](https://spdx.github.io/spdx-spec/v2.3/SPDX-license-expressions/#d42-disjunctive-or-operator) [Apache License 2.0](/licenses/apache-2.0/)
  * Les extensions et thèmes [WordPress](https://wordpress.org/about/license/) doivent être en [GNU GPLv2](/licenses/gpl-2.0/) (ou ultérieure)
  * Les extensions et templates [Joomla](https://tm.joomla.org/joomla-license-faq.html#can-i-release-an-extension-under-a-non-gpl-license) doivent être en [GNU GPLv2](/licenses/gpl-2.0/) pour le code PHP.
comm_p4: |-
  Les communautés sont de toutes formes et de toutes tailles, et plusieurs d'entre elles peuvent être pertinentes (par exemple, pensez à [votre entreprise](https://opensource.guide/legal/#what-does-my-companys-legal-team-need-to-know) si vous en avez une). Les exemples ci-dessus sont *très* bien établis. Si la communauté pour laquelle vous construisez un projet n'a pas de traditions de licence gravées dans le marbre, ou si vous ne considérez pas votre projet comme faisant partie d'une communauté particulière, ce n'est pas grave : [faites votre propre choix de licence open source](/).

# --- Aucune licence (/no-permission/) ---------------------------------------
np_p1: |-
  Lorsque vous créez une œuvre de l'esprit (ce qui inclut le code), celle-ci est par défaut soumise au droit d'auteur exclusif. À moins d'inclure une licence stipulant le contraire, personne d'autre ne peut copier, distribuer ou modifier votre travail sans risquer des retraits, des mises en demeure ou des poursuites. Une fois que l'œuvre compte d'autres contributeurs (chacun titulaire de droits d'auteur), « personne » commence à vous inclure.
np_p2: |-
  Même en l'absence de fichier de licence, vous pouvez accorder certains droits lorsque vous publiez votre code source sur un site dont l'utilisation suppose l'acceptation de conditions de service. Par exemple, si vous publiez votre code source dans un dépôt public sur GitHub, vous avez accepté les [conditions de service](https://help.github.com/articles/github-terms-of-service), par lesquelles vous autorisez autrui à consulter et forker votre dépôt. D'autres personnes peuvent ne pas avoir besoin de votre permission si des [limitations et exceptions au droit d'auteur](https://en.wikipedia.org/wiki/Limitations_and_exceptions_to_copyright) s'appliquent à leur situation particulière. Ni les conditions d'un site ni les limitations du droit d'auteur propres à une juridiction ne suffisent pour le type de collaboration que les gens recherchent habituellement sur un hébergeur de code public, comme l'expérimentation, la modification et le partage que favorise une licence open source.
np_p3: |-
  Vous n'avez rien à faire pour *ne pas* proposer de licence. Vous pouvez toutefois ajouter une mention de droit d'auteur et une déclaration indiquant que vous ne proposez aucune licence, à un endroit bien visible (par exemple le README de votre projet), afin que les [utilisateurs](#for-users) n'y voient pas un oubli. Si vous comptez accepter les contributions d'autrui à votre projet sans licence, vous pouvez envisager, avec votre juriste, d'ajouter un accord de contribution afin de conserver l'autorisation, au titre du droit d'auteur, des contributeurs, même si vous n'accordez pas la même chose.
np_p4: |-
  Interdire l'utilisation de votre code n'est peut-être pas ce que vous entendez par « aucune licence ». Une [licence open source](/) autorise la réutilisation de votre code tout en conservant le droit d'auteur. Si votre objectif est de renoncer totalement aux restrictions du droit d'auteur, essayez plutôt une [dédicace au domaine public](/licenses/#unlicense).
np_forusers_heading: "Pour les utilisateurs"
np_forusers_p: |-
  Si vous trouvez un logiciel dépourvu de licence, cela signifie généralement que vous n'avez aucune permission de ses créateurs pour l'utiliser, le modifier ou le partager. Même si un hébergeur de code comme GitHub vous permet d'en consulter et d'en forker le code, cela n'implique pas que vous soyez autorisé à utiliser, modifier ou partager le logiciel à quelque fin que ce soit.
np_options_intro: "Vos options :"
np_options_list: |-
  - **Demandez gentiment aux mainteneurs d'ajouter une licence.** Sauf indication contraire forte dans le logiciel, l'absence de licence est probablement un oubli. Si le logiciel est hébergé sur un site comme GitHub, ouvrez une issue demandant une licence et incluez un lien vers ce site. Si vous êtes audacieux et qu'il est assez évident quelle licence convient le mieux, ouvrez une pull request pour ajouter une licence – voir « suggérer cette licence » dans la barre latérale de la page de chaque licence de ce site (par exemple [MIT](/licenses/mit/#suggest-this-license)).
  - **N'utilisez pas le logiciel.** Trouvez ou créez une alternative placée sous une licence open source.
  - **Négociez une licence privée.** Faites appel à votre juriste.

# --- Licences pour œuvres non logicielles (/non-software/) ------------------
ns_intro: |-
  Les licences de logiciels open source peuvent aussi servir pour des œuvres non logicielles et constituent souvent le meilleur choix, surtout lorsque les œuvres concernées peuvent être éditées et versionnées comme du code source. [Choisissez une licence open source](/).
ns_data_heading: "Données, médias, etc."
ns_data_p: |-
  [CC0-1.0](/licenses/cc0-1.0/), [CC-BY-4.0](/licenses/cc-by-4.0/) et [CC-BY-SA-4.0](/licenses/cc-by-sa-4.0/) sont des licences [ouvertes](https://opendefinition.org) utilisées pour des contenus non logiciels, des jeux de données aux vidéos. Notez que Creative Commons [ne recommande pas l'usage de ses licences pour les logiciels](https://creativecommons.org/faq/#can-i-apply-a-creative-commons-license-to-software) ni pour le matériel.
ns_doc_heading: "Documentation"
ns_doc_p: |-
  Toute licence de logiciel open source ou licence ouverte pour les médias (voir [ci-dessus](#data-media-etc)) s'applique aussi à la documentation logicielle. Si vous utilisez des licences différentes pour votre logiciel et sa documentation, veillez à préciser que les exemples de code source figurant dans la documentation sont également placés sous la licence du logiciel.
ns_fonts_heading: "Polices"
ns_fonts_p: |-
  La [SIL Open Font License 1.1](/licenses/ofl-1.1/) garde les polices ouvertes, en permettant leur libre utilisation dans d'autres œuvres.
ns_hardware_heading: "Matériel"
ns_hardware_p: |-
  Les conceptions de [matériel open source](https://oshwa.org/resources/open-source-hardware-definition/), du mobilier aux [FPGA](https://oshwa.org/resources/best-practices-for-sharing-fpga-designs/), sont couvertes par les licences CERN Open Hardware : [CERN-OHL-P-2.0](/licenses/cern-ohl-p-2.0/) (permissive), [CERN-OHL-W-2.0](/licenses/cern-ohl-w-2.0/) (faiblement réciproque) et [CERN-OHL-S-2.0](/licenses/cern-ohl-s-2.0/) (fortement réciproque).
ns_mixed_heading: "Projets mixtes"
ns_mixed_p: |-
  Si votre projet mêle des types de contenus différents, vous pouvez inclure plusieurs licences, à condition d'indiquer clairement quelle licence s'applique à chaque partie du projet. Voir [la notice de licence de ce site](https://github.com/github/choosealicense.com#license) en exemple.

# --- Annexe (/appendix/) -----------------------------------------------------
appendix_intro_p1: |-
  À titre de référence, voici un tableau de toutes les licences décrites dans le [dépôt choosealicense.com](https://github.com/github/choosealicense.com).
appendix_intro_p2: |-
  Si vous êtes ici pour choisir une licence, **[commencez par la page d'accueil](/)** pour découvrir quelques licences qui conviendront à la plupart des cas.
appendix_col_license: "Licence"
appendix_legend_heading: "Légende"
appendix_legend_permissions_html: |-
  Les licences open source accordent au public des <span class="license-permissions"><span class="license-marker">✓</span></span> <b>permissions</b> de faire, avec les œuvres sous licence, des choses que le droit d’auteur ou d’autres lois de « propriété intellectuelle » pourraient sinon interdire.
appendix_legend_conditions_html: |-
  L’octroi des permissions par la plupart des licences open source est subordonné au respect de <span class="license-conditions"><span class="license-marker">ⓘ</span></span> <b>conditions</b>.
appendix_legend_limitations_html: |-
  La plupart des licences open source comportent aussi des <span class="license-limitations"><span class="license-marker">✕</span></span> <b>limitations</b> qui, généralement, excluent toute garantie et toute responsabilité, et parfois excluent expressément les brevets ou les marques de l’octroi de la licence.

