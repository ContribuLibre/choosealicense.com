name: Deploy site to GitHub Pages

# jekyll-polyglot isn't on the GitHub Pages plugin whitelist, so we build the
# site ourselves here (Actions, safe mode off → polyglot runs) and publish the
# built output to the `pages-build` branch. A .nojekyll file makes GitHub Pages
# serve the pre-built files as-is (no safe-mode rebuild that would drop polyglot).
#
# This avoids actions/configure-pages (the "GitHub Actions" Pages source), which
# needs OIDC + pages:write and fails opaquely ("TypeError: error must be an
# instance of Error") when those aren't available on a fork. Here we only need
# contents:write to push a branch.
#
# One-time setup by a maintainer:
#   - Settings → Pages → Source → "Deploy from a branch" → Branch: pages-build / (root)
#   - Settings → Actions → General → Workflow permissions → "Read and write"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the built site to the pages-build branch

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned SHA kept in sync with .github/workflows/test.yml (actions/checkout v4).
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          submodules: true

      - name: Set up Ruby
        # Pinned SHA kept in sync with .github/workflows/test.yml (ruby/setup-ruby).
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: 3.3.4
          bundler-cache: true

      - name: Build with Jekyll
        # Served at https://<owner>.github.io/<repo>/, so baseurl is the repo name.
        run: bundle exec jekyll build --baseurl "/${{ github.event.repository.name }}"
        env:
          JEKYLL_ENV: production
          # Lets jekyll-github-metadata resolve repository data non-interactively.
          PAGES_REPO_NWO: ${{ github.repository }}
          JEKYLL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to pages-build branch
        run: |
          touch _site/.nojekyll
          cd _site
          git init -q -b pages-build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${{ github.sha }}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" pages-build
